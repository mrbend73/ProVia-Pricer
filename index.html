<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProVia Order Pricer</title>
<meta name="theme-color" content="#1c1a17"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ProVia Pricer"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1ec;
  --card:#ffffff;
  --border:#e0dbd2;
  --border2:#ece8e0;
  --ink:#1c1a17;
  --muted:#8a8278;
  --green:#1a6b3a;
  --green-bg:#e8f5ee;
  --green-border:#b8dfc8;
  --red:#c0392b;
  --red-bg:#fdf0ee;
  --red-border:#e8b8b3;
  --blue:#1a4d8f;
  --blue-bg:#e8f0fb;
  --blue-border:#b8ccf0;
  --amber:#8a5a00;
  --amber-bg:#fdf3e0;
  --amber-border:#f0d090;
  --accent:#c8f04a;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 2px 8px rgba(0,0,0,.08),0 16px 48px rgba(0,0,0,.08);
}
html{font-size:16px}
body{background:var(--bg);color:var(--ink);font-family:'Geist Mono',monospace;min-height:100vh;padding-bottom:80px}

.site-header{
  background:var(--ink);color:#f4f1ec;
  padding:18px 24px 16px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;
}
.site-header h1{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;letter-spacing:-.01em;line-height:1}
.site-header h1 em{font-style:italic;color:var(--accent)}
.site-header .sub{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#6b6560;margin-top:3px}
.header-right{margin-left:auto}

.container{max-width:920px;margin:0 auto;padding:28px 20px}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:14px}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600}
.field input,.field select{
  background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  color:var(--ink);font-family:'Geist Mono',monospace;font-size:.88rem;
  padding:10px 12px;outline:none;width:100%;
  -webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(28,26,23,.07)}
.field input[type=password]{letter-spacing:.12em}

.btn-primary{
  padding:11px 20px;background:var(--ink);color:#f4f1ec;
  border:none;border-radius:9px;font-family:'Geist Mono',monospace;
  font-size:.78rem;font-weight:600;letter-spacing:.04em;
  cursor:pointer;width:100%;
  transition:opacity .15s,transform .1s;
}
.btn-primary:hover{opacity:.84;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}

.btn-sm{
  padding:7px 14px;background:var(--card);border:1.5px solid var(--border);
  border-radius:8px;font-family:'Geist Mono',monospace;font-size:.68rem;
  font-weight:600;letter-spacing:.04em;color:var(--ink);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-sm:hover{border-color:var(--ink);background:var(--ink);color:#f4f1ec}

.status-msg{font-size:.74rem;padding:9px 13px;border-radius:8px;margin-top:10px;line-height:1.6}
.status-msg.ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.status-msg.err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.status-msg.info{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
.status-msg.warn{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber)}

.cred-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.cred-note{font-size:.66rem;color:var(--muted)}

.results-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.order-title{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;line-height:1.3}
.order-meta{font-size:.68rem;color:var(--muted);margin-top:4px;margin-bottom:16px;line-height:1.6}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.results-table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:580px}
.results-table th{
  font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;
  color:var(--muted);font-weight:600;padding:8px 10px;
  border-bottom:1.5px solid var(--border);text-align:left;white-space:nowrap;
}
.results-table th.r{text-align:right}
.results-table td{padding:11px 10px;border-bottom:1px solid var(--border2);vertical-align:middle}
.results-table tr:last-child td{border-bottom:none}
.results-table tr:hover td{background:#faf8f5}
.num{text-align:right;font-variant-numeric:tabular-nums}

.item-desc{font-size:.8rem;font-weight:600;color:var(--ink);line-height:1.3}
.item-sub{font-size:.65rem;color:var(--muted);margin-top:2px;line-height:1.5}
.warn-note{font-size:.62rem;color:var(--amber);margin-top:3px}

.badge{display:inline-block;font-size:.54rem;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
.badge-win   {background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-door  {background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-patio {background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-other {background:var(--bg);color:var(--muted);border:1px solid var(--border)}

.labor-input{
  width:90px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:7px;color:var(--ink);font-family:'Geist Mono',monospace;
  font-size:.78rem;padding:6px 9px;text-align:right;outline:none;
  -webkit-appearance:none;
  transition:border-color .12s;
}
.labor-input:focus{border-color:var(--ink)}

.total-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;margin-top:16px;
  background:var(--ink);border-radius:11px;
}
.total-bar .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:#6b6560}
.total-bar .breakdown{font-size:.68rem;color:#8a8278;margin-top:4px}
.total-bar .amt{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:600;
  color:var(--accent);letter-spacing:-.02em}

.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(26,77,143,.3);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#f4f1ec;
  padding:10px 22px;border-radius:30px;font-size:.76rem;letter-spacing:.04em;
  opacity:0;transition:all .25s;pointer-events:none;z-index:300;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:540px){
  .field-row{grid-template-columns:1fr}
  .results-table{font-size:.72rem}
  .labor-input{width:78px}
  .total-bar .amt{font-size:1.5rem}
  .container{padding:16px 12px}
}

@media print{
  .site-header{position:static;background:#fff!important;color:#000!important;-webkit-print-color-adjust:exact}
  .site-header h1 em{color:#000!important}
  #cred-card,#fetch-card,.action-row,.btn-sm,.btn-primary{display:none!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important}
  .total-bar{background:#1c1a17!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>ProVia <em>Order</em> Pricer</h1>
    <div class="sub">entryLINK · Product + Labor</div>
  </div>
</header>

<div class="container">

  <!-- CREDENTIALS -->
  <div class="card" id="cred-card">
    <div class="card-title">entryLINK credentials</div>
    <div class="field-row">
      <div class="field">
        <label>Username</label>
        <input type="text" id="cred-user" placeholder="your username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="cred-pass" placeholder="your password" autocomplete="current-password"/>
      </div>
    </div>
    <div class="cred-row">
      <button class="btn-sm" onclick="saveCredentials()">Save credentials</button>
      <span class="cred-note" id="cred-status">Saved in your browser — enter once per device.</span>
    </div>
  </div>

  <!-- FETCH ORDER -->
  <div class="card" id="fetch-card">
    <div class="card-title">Pull order from entryLINK</div>
    <div class="field-row">
      <div class="field">
        <label>Order number</label>
        <input type="text" id="order-num" placeholder="e.g. 15038623"
          inputmode="numeric"
          onkeydown="if(event.key==='Enter')fetchOrder()"/>
      </div>
      <div class="field" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <button class="btn-primary" id="fetch-btn" onclick="fetchOrder()">Fetch order</button>
      </div>
    </div>
    <div id="fetch-status"></div>
  </div>

  <!-- RESULTS -->
  <div class="card" id="results-section" style="display:none">
    <div class="results-header">
      <div>
        <div class="order-title" id="order-title">Order</div>
        <div class="order-meta" id="order-meta"></div>
      </div>
      <button class="btn-sm" onclick="clearResults()">Clear</button>
    </div>

    <div class="table-wrap">
      <table class="results-table">
        <thead>
          <tr>
            <th style="width:32%">Item</th>
            <th style="width:6%" class="r">Qty</th>
            <th style="width:14%" class="r">Product</th>
            <th style="width:17%">Labor / unit</th>
            <th style="width:13%" class="r">Labor total</th>
            <th style="width:15%" class="r">Line total</th>
          </tr>
        </thead>
        <tbody id="line-body"></tbody>
      </table>
    </div>

    <div class="total-bar">
      <div>
        <div class="lbl">Grand total</div>
        <div class="breakdown" id="total-breakdown"></div>
      </div>
      <div class="amt" id="grand-total">—</div>
    </div>

    <div class="action-row">
      <button class="btn-sm" onclick="recalc()">Recalculate</button>
      <button class="btn-sm" onclick="copyTSV()">Copy as table (Excel)</button>
      <button class="btn-sm" onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Labor rate tables (Zen Labor Wizard) ──────────────────────────
const WINDOW_LABOR = {
  Nailfin:[[[0,120],1180],[[121,150],1450],[[151,180],1560]],
  Pocket: [[[0,120],910], [[121,150],970], [[151,180],1050]],
};
const PATIO_LABOR  = {"60x80":1350,"72x80":1458,"96x80":1620,"96x96":2160,"3 Lite":2160,"4 Lite":2700};
const ENTRY_BASE   = {"Single-80":1290,"Single-96":1610,"Double-80":1880,"Double-96":2680};
const SIDELITE     = {80:220,96:270};
const TRANSOM      = {"None":0,"0-12":220,"12-24":330};

const fmt = n => "$" + Math.round(n).toLocaleString();

function getWindowRate(ui, method) {
  for (const [[lo,hi],p] of (WINDOW_LABOR[method]||WINDOW_LABOR.Nailfin))
    if (ui >= lo && ui <= hi) return p;
  return null;
}

// ── Credentials (localStorage) ────────────────────────────────────
function loadCreds() {
  try {
    const c = JSON.parse(localStorage.getItem("provia_creds") || "{}");
    if (c.u) document.getElementById("cred-user").value = c.u;
    if (c.p) document.getElementById("cred-pass").value = c.p;
    if (c.u) document.getElementById("cred-status").textContent = "Credentials loaded.";
  } catch(e) {}
}

function saveCredentials() {
  const u = document.getElementById("cred-user").value.trim();
  const p = document.getElementById("cred-pass").value.trim();
  if (!u || !p) { setCredStatus("Enter both fields first."); return; }
  try {
    localStorage.setItem("provia_creds", JSON.stringify({u,p}));
    setCredStatus("Saved.");
    showToast("Credentials saved");
    setTimeout(() => setCredStatus("Saved in your browser — enter once per device."), 2500);
  } catch(e) {
    setCredStatus("Could not save — storage may be blocked.");
  }
}

function setCredStatus(msg) {
  document.getElementById("cred-status").textContent = msg;
}

// ── Fetch via Netlify proxy ───────────────────────────────────────
let parsedLines = [];

async function fetchOrder() {
  const orderNum = document.getElementById("order-num").value.trim();
  const u = document.getElementById("cred-user").value.trim();
  const p = document.getElementById("cred-pass").value.trim();

  if (!orderNum) { showFetchStatus("Enter an order number.", "err"); return; }
  if (!u || !p)  { showFetchStatus("Enter your entryLINK credentials above first.", "err"); return; }

  const btn = document.getElementById("fetch-btn");
  btn.disabled = true;
  btn.textContent = "Fetching…";
  showFetchStatus('<span class="spinner"></span>Contacting entryLINK…', "info");

  // POST credentials in body — avoids header stripping by CDN layers
  try {
    const resp = await fetch("/.netlify/functions/entrylink", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ u, p, m: "getorder2", o: orderNum, fmt: "json" }),
    });
    const text = await resp.text();

    if (resp.status === 401) {
      showFetchStatus("Invalid username or password (401). Check your entryLINK credentials.", "err");
      return;
    }
    if (!resp.ok) {
      showFetchStatus(`Error ${resp.status}: ${text.slice(0,200)}`, "err");
      return;
    }

    // Parse JSON — handle possible XML fallback
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      if (text.trim().startsWith("<")) {
        showFetchStatus("entryLINK returned XML instead of JSON — this may mean the order number is invalid or the account lacks access.", "err");
      } else {
        showFetchStatus("Could not parse response: " + e.message, "err");
      }
      console.log("Raw response:", text.slice(0, 500));
      return;
    }

    renderOrder(data, orderNum);
    showFetchStatus("", "");

  } catch(e) {
    showFetchStatus("Request failed: " + e.message, "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Fetch order";
  }
}

function enc(s) { return encodeURIComponent(s); }

function showFetchStatus(msg, type) {
  const el = document.getElementById("fetch-status");
  if (!msg) { el.innerHTML = ""; return; }
  el.innerHTML = `<div class="status-msg ${type}">${msg}</div>`;
}

// ── Line classification ───────────────────────────────────────────
function classifyLine(line) {
  const d = [
    line.Description, line.ItemDescription, line.PartDesc,
    line.Category, line.ProductLine, line.ProductDescription
  ].filter(Boolean).join(" ").toUpperCase();

  if (/PATIO|SLIDING.?DOOR/.test(d))                          return "patio";
  if (/ENTRY|STORM|FRENCH|INSWING|OUTSWING/.test(d) &&
      !/WINDOW/.test(d))                                       return "door";
  if (/WINDOW|HUNG|SLIDER|CASEMENT|AWNING|GLIDER|EN[0-9]{3}/.test(d)) return "window";
  return "other";
}

function guessLaborRate(line, type) {
  const d = [line.Description, line.ItemDescription, line.PartDesc, line.ProductDescription]
    .filter(Boolean).join(" ").toUpperCase();

  if (type === "window") {
    const m = d.match(/(\d{2,3})["\s]*[×XxX*\/]["\s]*(\d{2,3})/);
    if (m) {
      const ui = parseInt(m[1]) + parseInt(m[2]);
      return getWindowRate(ui, "Nailfin") || 1180;
    }
    return 1180;
  }

  if (type === "patio") {
    if (/4.?LITE|4L/.test(d))  return PATIO_LABOR["4 Lite"];
    if (/3.?LITE|3L/.test(d))  return PATIO_LABOR["3 Lite"];
    if (/96.{0,3}96/.test(d))  return PATIO_LABOR["96x96"];
    if (/96/.test(d))          return PATIO_LABOR["96x80"];
    if (/72/.test(d))          return PATIO_LABOR["72x80"];
    return PATIO_LABOR["60x80"];
  }

  if (type === "door") {
    const isDouble = /DOUBLE|FRENCH/.test(d);
    const is96     = /96/.test(d);
    const sideM    = d.match(/(\d)\s*SIDELITE/);
    const hasTrans = /TRANSOM/.test(d);
    let base = ENTRY_BASE[`${isDouble?"Double":"Single"}-${is96?96:80}`] || 1290;
    if (sideM)     base += SIDELITE[is96?96:80] * parseInt(sideM[1]);
    if (hasTrans)  base += TRANSOM["0-12"];
    return base;
  }

  return 0;
}

function getLineProductPrice(line) {
  const fields = [
    "SellPriceExt","PriceSellExt","LineTotal","ExtendedSell",
    "TotalSell","ExtSell","SellExt","Total","Sell"
  ];
  for (const f of fields) {
    const n = parseFloat(line[f]);
    if (!isNaN(n) && n > 0) return n;
  }
  // Fallback: unit × qty
  const unitFields = ["SellPrice","PriceSell","UnitSell","UnitPrice","Price"];
  for (const f of unitFields) {
    const n = parseFloat(line[f]);
    if (!isNaN(n) && n > 0) return n * parseInt(line.Qty || line.Quantity || 1);
  }
  return 0;
}

// ── Render ────────────────────────────────────────────────────────
function renderOrder(data, orderNum) {
  // entryLINK wraps everything under an "Order" key
  const order = data.Order || data;

  const lines = order.Lines || order.OrderLines || order.Items ||
                order.LineItems || order.lines ||
                data.Lines || data.OrderLines || data.Items || [];

  if (!lines.length) {
    // Show raw keys to help debug structure
    const keys = JSON.stringify(Object.keys(data));
    const orderKeys = data.Order ? JSON.stringify(Object.keys(data.Order)) : "n/a";
    showFetchStatus(
      "Order found but no line items returned. Top-level keys: " + keys + " | Order keys: " + orderKeys,
      "warn"
    );
    return;
  }

  const po     = order.PONumber || order.PO || order.PONum || "";
  const job    = order.JobName  || order.Job || order.JobNum || "";
  const cust   = order.CustomerName || order.CustName || order.LocationName || order.CustomerLocationName || "";
  const status = order.Status || order.OrderStatus || "";

  document.getElementById("order-title").textContent =
    `Order #${orderNum}` +
    (po   ? `  ·  PO ${po}`   : "") +
    (job  ? `  ·  ${job}`     : "");

  document.getElementById("order-meta").textContent =
    [cust, status ? "Status: " + status : "", `${lines.length} line item${lines.length!==1?"s":""}`]
      .filter(Boolean).join("  ·  ");

  parsedLines = lines.map((line, i) => {
    const type      = classifyLine(line);
    const qty       = parseInt(line.Qty || line.Quantity || 1);
    const prodExt   = getLineProductPrice(line);
    const laborRate = guessLaborRate(line, type);
    return { i, line, type, qty, prodExt, laborRate };
  });

  renderTable();
  document.getElementById("results-section").style.display = "block";
  setTimeout(() => {
    document.getElementById("results-section").scrollIntoView({behavior:"smooth",block:"start"});
  }, 80);
}

function renderTable() {
  const tbody = document.getElementById("line-body");
  tbody.innerHTML = "";

  parsedLines.forEach(row => {
    const { i, line, type, qty, prodExt, laborRate } = row;
    const desc   = line.Description || line.ItemDescription || line.PartDesc || `Line ${i+1}`;
    const tag    = line.Tag || line.TagName || line.JobTag || "";
    const partNo = line.PartNo || line.ItemNo || line.PartNumber || "";
    const laborExt  = laborRate * qty;
    const lineTotal = prodExt + laborExt;

    const labels = {window:"Window",patio:"Patio Door",door:"Door",other:"Other"};
    const badges = {window:"badge-win",patio:"badge-patio",door:"badge-door",other:"badge-other"};
    const subParts = [tag, partNo].filter(Boolean);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <div class="item-desc">${esc(desc)}<span class="badge ${badges[type]}">${labels[type]}</span></div>
        ${subParts.length ? `<div class="item-sub">${subParts.map(esc).join(" · ")}</div>` : ""}
        ${type==="other" && laborRate===0 ? `<div class="warn-note">No labor rate applied — override if needed</div>` : ""}
      </td>
      <td class="num">${qty}</td>
      <td class="num">${prodExt > 0 ? fmt(prodExt) : '<span style="color:var(--muted)">—</span>'}</td>
      <td>
        <input class="labor-input" type="number" min="0" step="10"
          value="${Math.round(laborRate)}" inputmode="decimal"
          onchange="updateLabor(${i},this.value)"
          title="Labor per unit · auto-calculated from Zen Labor rates"/>
        <div style="font-size:.6rem;color:var(--muted);margin-top:3px">per unit</div>
      </td>
      <td class="num" id="le-${i}">${fmt(laborExt)}</td>
      <td class="num" id="lt-${i}"><strong>${fmt(lineTotal)}</strong></td>
    `;
    tbody.appendChild(tr);
  });

  recalc();
}

function updateLabor(idx, val) {
  parsedLines[idx].laborRate = parseFloat(val) || 0;
  const { laborRate, qty, prodExt } = parsedLines[idx];
  document.getElementById(`le-${idx}`).textContent = fmt(laborRate * qty);
  document.getElementById(`lt-${idx}`).innerHTML = `<strong>${fmt(prodExt + laborRate * qty)}</strong>`;
  recalc();
}

function recalc() {
  let tp = 0, tl = 0;
  parsedLines.forEach(({ prodExt, laborRate, qty }) => { tp += prodExt; tl += laborRate * qty; });
  document.getElementById("grand-total").textContent = fmt(tp + tl);
  document.getElementById("total-breakdown").textContent = `Product ${fmt(tp)}  +  Labor ${fmt(tl)}`;
}

function clearResults() {
  document.getElementById("results-section").style.display = "none";
  document.getElementById("order-num").value = "";
  parsedLines = [];
  showFetchStatus("", "");
}

// ── Copy as TSV for Excel ─────────────────────────────────────────
function copyTSV() {
  const headers = ["Item","Tag","Part No","Qty","Product Total","Labor/Unit","Labor Total","Line Total"];
  const rows = parsedLines.map(({ line, qty, prodExt, laborRate }) => {
    return [
      line.Description || line.ItemDescription || line.PartDesc || "",
      line.Tag || line.TagName || "",
      line.PartNo || line.ItemNo || "",
      qty,
      Math.round(prodExt),
      Math.round(laborRate),
      Math.round(laborRate * qty),
      Math.round(prodExt + laborRate * qty)
    ].join("\t");
  });
  let tp=0, tl=0;
  parsedLines.forEach(r=>{tp+=r.prodExt; tl+=r.laborRate*r.qty;});
  const totRow = ["TOTAL","","","",Math.round(tp),"",Math.round(tl),Math.round(tp+tl)].join("\t");
  const text = [headers.join("\t"), ...rows, "", totRow].join("\n");

  navigator.clipboard.writeText(text)
    .then(() => showToast("Copied — paste into Excel"))
    .catch(() => showToast("Copy failed — try again"));
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Init ──────────────────────────────────────────────────────────
loadCreds();
</script>
